<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  overflow: hidden;
}

/* Floating Hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* Main */
.container {
  margin-top: 100px;
}

h1 {
  font-size: 40px;
  color: white;
}

p {
  color: white;
  font-size: 20px;
}

/* Buttons */
.btn {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 20px;
  transition: 0.3s;
}

#yes {
  background: #ff4d6d;
  color: white;
}

#no {
  background: #333;
  color: white;
  position: absolute;
}

/* Popup */
#loveMessage {
  display: none;
  font-size: 30px;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey Rashi ❤️</h1>
  <p>You are the best thing in my life 💖</p>
  <h2>Will you be mine forever? 😘</h2>

  <button id="yes" class="btn" onclick="yesClicked()">YES 💖</button>
  <button id="no" class="btn">NO 😄</button>

  <div id="loveMessage">I KNEW IT 😍❤️</div>
</div>

<script>
/* Runaway NO button */
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* YES click */
function yesClicked() {
  document.getElementById("loveMessage").style.display = "block";
  startHearts();
}

/* Floating hearts */
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
